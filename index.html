<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Positions — NJ Transit Train Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #14181d;
    --panel: #1c2229;
    --panel-2: #232b34;
    --line: #2e3844;
    --text: #e8ecef;
    --muted: #8a94a0;
    --amber: #ffb020;
    --amber-dim: rgba(255, 176, 32, 0.12);
    --green: #4cc38a;
    --red: #ff6369;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Archivo', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 32px 16px 64px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }

  header { margin-bottom: 24px; }
  .eyebrow {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 6px;
  }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px;
  }
  .field { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="text"], input[type="date"], input[type="time"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 15px;
    padding: 11px 12px;
    color-scheme: dark;
  }
  input:focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: 1px;
    border-color: transparent;
  }
  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }

  .go {
    width: 100%;
    margin-top: 6px;
    background: var(--amber);
    color: #1a1206;
    border: none;
    border-radius: 8px;
    font-family: 'Archivo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    padding: 13px;
    cursor: pointer;
  }
  .go:hover { filter: brightness(1.06); }
  .go:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }
  .go:disabled { opacity: 0.5; cursor: wait; }

  .status {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 13px;
    color: var(--muted);
    margin-top: 14px;
    min-height: 18px;
    line-height: 1.6;
  }
  .status.err { color: var(--red); }

  /* Report strip */
  .report { margin-top: 24px; display: none; }
  .report.show { display: block; }
  .strip {
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 4px solid var(--amber);
    border-radius: 10px;
    padding: 22px;
  }
  .strip-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 16px;
  }
  .place { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .line-chip {
    display: inline-block;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    color: #10151a;
  }
  .when {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 13px;
    color: var(--muted);
  }
  .headline { margin-bottom: 18px; }
  .big-status {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.25;
    color: var(--amber);
  }
  .sub-status { font-size: 14px; color: var(--muted); margin-top: 6px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  .cell { background: var(--panel-2); padding: 12px 14px; }
  .cell .k {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .cell .v {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 15px;
    font-weight: 500;
  }

  #map {
    height: 320px;
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-top: 18px;
    background: var(--panel-2);
    display: none;
  }
  #map.show { display: block; }

  .stops { margin-top: 18px; }
  .stops h3 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  table { width: 100%; border-collapse: collapse; font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 12.5px; }
  th, td { text-align: right; padding: 7px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; }
  th { color: var(--muted); font-weight: 500; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
  tr.target td { color: var(--amber); font-weight: 600; }
  tr.done td { color: var(--muted); }
  .tbl-scroll { overflow-x: auto; }

  .source {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 14px;
    line-height: 1.6;
  }
  @media (prefers-reduced-motion: no-preference) {
    .report.show { animation: fadein 0.4s ease-out; }
    .report.show .strip { animation: rise 0.25s ease-out; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Train Lookup</div>
    <h1>Where was that train?</h1>
    <div class="sub">Train number + date + time. Scheduled positions for every NJ Transit rail line.</div>
  </header>

  <div class="card">
    <div class="field">
      <label for="train">Train number</label>
      <input type="text" id="train" placeholder="e.g. 1625" autocomplete="off" inputmode="numeric">
    </div>
    <div class="row">
      <div class="field">
        <label for="date">Date</label>
        <input type="date" id="date">
      </div>
      <div class="field">
        <label for="time">Time</label>
        <input type="time" id="time">
      </div>
    </div>
    <button class="go" id="go" onclick="lookup()">Find the train</button>
    <div class="status" id="status" role="status"></div>
  </div>

  <div class="report" id="report">
    <div class="strip">
      <div class="strip-head">
        <div>
          <div class="place"><span id="rTrain"></span><span class="line-chip" id="rLine"></span></div>
          <div class="when" id="rWhen"></div>
        </div>
      </div>
      <div class="headline">
        <div class="big-status" id="rStatus"></div>
        <div class="sub-status" id="rSubStatus"></div>
      </div>
      <div class="grid" id="rGrid"></div>
      <div id="map"></div>
      <div class="stops">
        <h3>Full schedule</h3>
        <div class="tbl-scroll"><table id="rTable"></table></div>
      </div>
      <div class="source" id="rSource"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const META = window.TT_META;
const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
let map = null, mapLayers = null;
const yearLoads = {}; // year -> Promise

// Defaults: today, now
const now = new Date();
document.getElementById('date').value = now.getFullYear() + '-' +
  String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
document.getElementById('time').value =
  String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
document.getElementById('train').addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });

function setStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.toggle('err', !!isErr);
}

function fmtMin(m) {
  // minutes-after-midnight (may exceed 1440 for after-midnight stops) → "5:02 PM" / "12:31 AM +1"
  const extra = m >= 1440 ? ' +1' : '';
  const mm = ((m % 1440) + 1440) % 1440;
  let h = Math.floor(mm / 60);
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + String(mm % 60).padStart(2, '0') + ' ' + ap + extra;
}

function fmtDateKey(key) {
  // "20260710" → "Fri, Jul 10 2026"
  const d = new Date(+key.slice(0, 4), +key.slice(4, 6) - 1, +key.slice(6, 8));
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function dateKeyOf(dateStr) { return dateStr.replaceAll('-', ''); }

function prevDateKey(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10).replaceAll('-', '');
}

function normNum(s) { return String(s).trim().toUpperCase().replace(/^0+(?=.)/, ''); }

function coverageLabel() {
  const ys = Object.keys(META.years).sort();
  return fmtDateKey(META.years[ys[0]].from) + ' – ' + fmtDateKey(META.years[ys[ys.length - 1]].to);
}

// Lazy-load data/data-YYYY.js; resolves to window.TT_YEARS[year] or null if unavailable
function ensureYear(year) {
  if (!META.years[year]) return Promise.resolve(null);
  if (window.TT_YEARS && window.TT_YEARS[year]) return Promise.resolve(window.TT_YEARS[year]);
  yearLoads[year] ??= new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'data/data-' + year + '.js';
    s.onload = () => resolve(window.TT_YEARS[year] || null);
    s.onerror = () => { delete yearLoads[year]; resolve(null); };
    document.head.appendChild(s);
  });
  return yearLoads[year];
}

function runsOn(trip, dateKey) {
  // Trip day bitmask is per calendar year, bit index = day-of-year
  const y = +dateKey.slice(0, 4);
  const doy = Math.round((new Date(y, +dateKey.slice(4, 6) - 1, +dateKey.slice(6, 8)) - new Date(y, 0, 1)) / 86400000);
  const byte = parseInt(trip.d.substr((doy >> 3) * 2, 2), 16);
  return !!(byte >> (doy & 7) & 1);
}

function tripDates(trip, year) {
  const out = [];
  const y0 = new Date(+year, 0, 1);
  for (let doy = 0; doy < 366; doy++) {
    if (parseInt(trip.d.substr((doy >> 3) * 2, 2), 16) >> (doy & 7) & 1) {
      const d = new Date(y0.getTime() + doy * 86400000);
      out.push(d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0'));
    }
  }
  return out;
}

function dayPattern(dates) {
  const dows = new Set(dates.map(k => new Date(+k.slice(0, 4), +k.slice(4, 6) - 1, +k.slice(6, 8)).getDay()));
  const has = d => dows.has(d);
  if ([1, 2, 3, 4, 5].every(has) && !has(0) && !has(6)) return 'weekdays';
  if (has(0) && has(6) && ![1, 2, 3, 4, 5].some(has)) return 'weekends';
  return [1, 2, 3, 4, 5, 6, 0].filter(has).map(d => DAY_NAMES[d]).join(', ');
}

function positionAt(trip, minute) {
  // Where is this trip at `minute` (service-day frame)?
  const st = trip.st;
  if (minute < st[0][2]) return { kind: 'before' };
  const last = st[st.length - 1];
  if (minute > last[1]) return { kind: 'after' };
  for (let i = 0; i < st.length; i++) {
    const [, arr, dep] = st[i];
    if (minute >= arr && minute <= dep) return { kind: 'at', i };
    if (i < st.length - 1 && minute > dep && minute < st[i + 1][1]) {
      const span = st[i + 1][1] - dep;
      return { kind: 'between', i, frac: span > 0 ? (minute - dep) / span : 1 };
    }
  }
  return { kind: 'at', i: st.length - 1 };
}

async function lookup() {
  const numRaw = document.getElementById('train').value;
  const dateStr = document.getElementById('date').value;
  const timeStr = document.getElementById('time').value;
  const report = document.getElementById('report');
  const btn = document.getElementById('go');

  if (!META) { setStatus('data.js is missing — run: node tools/build-data.mjs', true); return; }
  if (!normNum(numRaw)) { setStatus('Enter a train number.', true); return; }
  if (!dateStr) { setStatus('Pick a date.', true); return; }
  if (!timeStr) { setStatus('Pick a time.', true); return; }

  const num = normNum(numRaw);
  const dateKey = dateKeyOf(dateStr);
  const prevKey = prevDateKey(dateStr);
  const minute = parseInt(timeStr.slice(0, 2), 10) * 60 + parseInt(timeStr.slice(3, 5), 10);
  const year = dateKey.slice(0, 4), prevYear = prevKey.slice(0, 4);

  btn.disabled = true;
  try {
    // Coverage checks against the manifest before loading anything
    const yMeta = META.years[year];
    if (!yMeta || dateKey < yMeta.from || dateKey > yMeta.to) {
      // Allow near-boundary miss to still explain itself clearly
      report.classList.remove('show');
      setStatus('No schedule data for ' + fmtDateKey(dateKey) + '. This build covers ' + coverageLabel() +
        (yMeta && dateKey < yMeta.from ? ' (note: ' + year + ' data begins ' + fmtDateKey(yMeta.from) + ').' : '.') +
        ' See README to extend or refresh the data.', true);
      return;
    }

    setStatus('Loading ' + year + ' schedules…');
    const [yData, pData] = await Promise.all([ensureYear(year), ensureYear(prevYear)]);
    if (!yData) {
      report.classList.remove('show');
      setStatus('Could not load data/data-' + year + '.js — rebuild the data (see README).', true);
      return;
    }

    const candidates = [];
    for (const t of yData.trips) {
      if (normNum(t.t) === num && runsOn(t, dateKey)) candidates.push({ data: yData, trip: t, svcDate: dateKey, m: minute });
    }
    if (pData) {
      for (const t of pData.trips) {
        if (normNum(t.t) === num && runsOn(t, prevKey) &&
            minute + 1440 <= t.st[t.st.length - 1][1] + 120) {
          candidates.push({ data: pData, trip: t, svcDate: prevKey, m: minute + 1440 });
        }
      }
    }

    if (!candidates.length) {
      report.classList.remove('show');
      const sameNum = yData.trips.filter(t => normNum(t.t) === num);
      if (!sameNum.length) {
        setStatus('No train #' + num + ' found in ' + year + ' schedules.', true);
      } else {
        const dates = [...new Set(sameNum.flatMap(t => tripDates(t, year)))].sort();
        setStatus('Train #' + num + ' doesn’t run on ' + fmtDateKey(dateKey) + '. In ' + year +
          ' it runs ' + dayPattern(dates) + ', ' + fmtDateKey(dates[0]) + ' – ' +
          fmtDateKey(dates[dates.length - 1]) + '.', true);
      }
      return;
    }

    // Prefer a candidate that is mid-run at the queried moment
    candidates.sort((a, b) => {
      const rank = c => { const k = positionAt(c.trip, c.m).kind; return k === 'before' ? 1 : k === 'after' ? 2 : 0; };
      return rank(a) - rank(b);
    });
    const c = candidates[0];
    setStatus('');
    render(c.data, c.trip, c.svcDate, dateKey, c.m, timeStr);
  } finally {
    btn.disabled = false;
  }
}

function render(data, trip, svcDate, queryDateKey, m, timeStr) {
  const route = data.routes[trip.r];
  const st = trip.st;
  const pos = positionAt(trip, m);
  const stName = i => data.stations[i][0];
  const origin = st[0], dest = st[st.length - 1];

  document.getElementById('rTrain').textContent = 'Train ' + trip.t + ' to ' + trip.h;
  const chip = document.getElementById('rLine');
  chip.textContent = route[0];
  chip.style.background = '#' + route[1];

  let when = fmtDateKey(queryDateKey) + ' · ' + fmtMin(parseInt(timeStr.slice(0, 2), 10) * 60 + parseInt(timeStr.slice(3, 5), 10));
  if (svcDate !== queryDateKey) when += ' (after-midnight run of ' + fmtDateKey(svcDate) + ')';
  document.getElementById('rWhen').textContent = when;

  let statusTxt, subTxt, pinLat, pinLon, hiRows = [];
  if (pos.kind === 'before') {
    statusTxt = 'Not yet departed';
    subTxt = 'Scheduled to leave ' + stName(origin[0]) + ' at ' + fmtMin(origin[2]) + '.';
    [, pinLat, pinLon] = data.stations[origin[0]]; hiRows = [0];
  } else if (pos.kind === 'after') {
    statusTxt = 'Run completed';
    subTxt = 'Arrived at ' + stName(dest[0]) + ' at ' + fmtMin(dest[1]) + '.';
    [, pinLat, pinLon] = data.stations[dest[0]]; hiRows = [st.length - 1];
  } else if (pos.kind === 'at') {
    const s = st[pos.i];
    statusTxt = 'At ' + stName(s[0]);
    const next = st[pos.i + 1];
    subTxt = next
      ? 'Heading toward ' + trip.h + ' · next stop ' + stName(next[0]) + ' at ' + fmtMin(next[1]) + '.'
      : 'Final stop.';
    [, pinLat, pinLon] = data.stations[s[0]]; hiRows = [pos.i];
  } else {
    const a = st[pos.i], b = st[pos.i + 1];
    const [, aLat, aLon] = data.stations[a[0]], [, bLat, bLon] = data.stations[b[0]];
    statusTxt = 'Between ' + stName(a[0]) + ' and ' + stName(b[0]);
    subTxt = 'About ' + Math.round(pos.frac * 100) + '% of the way · heading toward ' + trip.h +
      ' · next stop ' + stName(b[0]) + ' at ' + fmtMin(b[1]) + '.';
    pinLat = aLat + (bLat - aLat) * pos.frac;
    pinLon = aLon + (bLon - aLon) * pos.frac;
    hiRows = [pos.i, pos.i + 1];
  }
  document.getElementById('rStatus').textContent = statusTxt;
  document.getElementById('rSubStatus').textContent = subTxt;

  const mps = (META.mileposts || {})[route[0]];
  const mpOf = i => (mps ? mps[stName(i)] : undefined);
  let curMp;
  if (pos.kind === 'before') curMp = mpOf(origin[0]);
  else if (pos.kind === 'after') curMp = mpOf(dest[0]);
  else if (pos.kind === 'at') curMp = mpOf(st[pos.i][0]);
  else {
    const mpA = mpOf(st[pos.i][0]), mpB = mpOf(st[pos.i + 1][0]);
    if (mpA !== undefined && mpB !== undefined) curMp = mpA + (mpB - mpA) * pos.frac;
  }

  const runSpan = dest[1] - origin[2];
  const doneFrac = pos.kind === 'before' ? 0 : pos.kind === 'after' ? 1 :
    Math.min(1, Math.max(0, (m - origin[2]) / (runSpan || 1)));
  const stopsPassed = pos.kind === 'before' ? 0 : pos.kind === 'after' ? st.length : pos.i + 1;
  const cells = [
    ['Origin', stName(origin[0]) + ' ' + fmtMin(origin[2])],
    ['Destination', stName(dest[0]) + ' ' + fmtMin(dest[1])],
    ['Run time', Math.floor(runSpan / 60) ? Math.floor(runSpan / 60) + 'h ' + (runSpan % 60) + 'm' : runSpan + ' min'],
    ['Progress', Math.round(doneFrac * 100) + '% · stop ' + stopsPassed + ' of ' + st.length],
  ];
  // Show the tile whenever the line has milepost data, with "—" where the
  // train's current spot has no trustworthy value — a vanishing tile reads
  // as broken, but a dash reads as an answer.
  if (mps) cells.push(['Milepost', curMp !== undefined ? 'MP ' + curMp.toFixed(1) : 'MP —']);
  cells.push(['Lat', pinLat.toFixed(4)], ['Long', pinLon.toFixed(4)]);
  document.getElementById('rGrid').innerHTML = cells.map(c =>
    '<div class="cell"><div class="k">' + c[0] + '</div><div class="v">' + c[1] + '</div></div>').join('');

  let rows = '<tr><th>Station</th>' + (mps ? '<th>MP</th>' : '') + '<th>Arrives</th><th>Departs</th></tr>';
  st.forEach(([id, arr, dep], i) => {
    const cls = hiRows.includes(i) ? ' class="target"' : (pos.kind !== 'before' && i < hiRows[0] ? ' class="done"' : '');
    const mp = mpOf(id);
    rows += '<tr' + cls + '><td>' + stName(id) + '</td>' +
      (mps ? '<td>' + (mp !== undefined ? mp.toFixed(1) : '—') + '</td>' : '') +
      '<td>' + fmtMin(arr) + '</td><td>' + fmtMin(dep) + '</td></tr>';
  });
  document.getElementById('rTable').innerHTML = rows;

  document.getElementById('rSource').textContent =
    'Scheduled position from NJ Transit GTFS schedules published at the time (coverage ' + coverageLabel() +
    ', built ' + META.generated + ') · Not real-time — actual trains may have varied. ' +
    'Position between stations is approximated on a straight line.' +
    (mps ? ' Mileposts approximated from the FRA grade-crossing inventory.' : '');

  drawMap(data, trip, pinLat, pinLon, '#' + route[1]);

  const rep = document.getElementById('report');
  rep.classList.remove('show');
  void rep.offsetWidth;
  rep.classList.add('show');
}

function drawMap(data, trip, pinLat, pinLon, color) {
  const el = document.getElementById('map');
  if (typeof L === 'undefined') { el.classList.remove('show'); return; }
  el.classList.add('show');
  if (!map) {
    map = L.map('map', { scrollWheelZoom: false });
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);
    mapLayers = L.layerGroup().addTo(map);
  }
  mapLayers.clearLayers();
  const pts = trip.st.map(([i]) => [data.stations[i][1], data.stations[i][2]]);
  L.polyline(pts, { color, weight: 3, opacity: 0.75 }).addTo(mapLayers);
  trip.st.forEach(([i]) => {
    L.circleMarker([data.stations[i][1], data.stations[i][2]], {
      radius: 4, color: '#8a94a0', weight: 1, fillColor: '#232b34', fillOpacity: 1
    }).addTo(mapLayers).bindTooltip(data.stations[i][0]);
  });
  L.circleMarker([pinLat, pinLon], {
    radius: 9, color: '#1a1206', weight: 2, fillColor: '#ffb020', fillOpacity: 1
  }).addTo(mapLayers).bindTooltip('Train ' + trip.t + ' (scheduled position)');
  // The report strip is still hidden when this runs, so the map has zero size;
  // fit the bounds only after Leaflet re-measures the now-visible container.
  const bounds = L.latLngBounds(pts).pad(0.15);
  map.fitBounds(bounds);
  setTimeout(() => { map.invalidateSize(); map.fitBounds(bounds); }, 60);
}
</script>
</body>
</html>
